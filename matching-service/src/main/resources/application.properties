spring.application.name=matching-service
server.port=${SERVER_PORT:8080}

# MongoDB
spring.data.mongodb.uri=${SPRING_DATA_MONGODB_URI:mongodb://localhost:27017/matching-service}
spring.data.mongodb.auto-index-creation=true

# Redis
spring.data.redis.host=${SPRING_REDIS_HOST:redis}
spring.data.redis.port=${SPRING_REDIS_PORT:6379}

# Internal service URLs
question.service.url=${QUESTION_SERVICE_URL:http://question-service:8000}
collaboration.service.url=${COLLABORATION_SERVICE_URL:http://collaboration-service:1234}
