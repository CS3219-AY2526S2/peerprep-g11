services:
  user-service:
    build:
      context: ./user-service
    restart: unless-stopped
    env_file:
      - ./user-service/.env
    environment:
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://localhost:3001}

  question-service:
    build:
      context: ./question-service
    restart: unless-stopped
    env_file:
      - ./question-service/.env

  matching-service:
    build:
      context: ./matching-service
    restart: unless-stopped
    env_file:
      - ./matching-service/application.properties
    environment:
      SERVER_PORT: 8080

  ai-assistant-service:
    build:
      context: ./ai-assistant-service
    depends_on:
      user-service:
        condition: service_started
    restart: unless-stopped
    env_file:
      - ./ai-assistant-service/.env
    environment:
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://localhost:3001}

  frontend:
    build:
      context: ./frontend
    depends_on:
      user-service:
        condition: service_started
      question-service:
        condition: service_started
      matching-service:
        condition: service_started
      ai-assistant-service:
        condition: service_started
    restart: unless-stopped
    environment:
      NODE_ENV: production
      HOSTNAME: 0.0.0.0
      PORT: 3000
      USER_SERVICE_URL: http://user-service:4001
      QUESTION_SERVICE_URL: http://question-service:8000
      MATCHING_SERVICE_URL: http://matching-service:8080
      AI_ASSISTANT_SERVICE_URL: http://ai-assistant-service:4002
    ports:
      - "${FRONTEND_PORT:-3001}:3000"
